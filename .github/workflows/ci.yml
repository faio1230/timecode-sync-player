name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build src/TimecodeSyncPlayer/TimecodeSyncPlayer.csproj -c Debug -v minimal
      - name: Test (non-E2E)
        run: dotnet test tests/TimecodeSyncPlayer.Tests/TimecodeSyncPlayer.Tests.csproj -c Debug --filter "FullyQualifiedName!~E2ETests" --collect:"XPlat Code Coverage" --results-directory TestResults -v minimal
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        # テスト失敗時にもカバレッジを回収するため always() を指定する。
        # upload-artifact v4 はファイルが無い場合でも warn 止まりでジョブは失敗しない。
        if: always()
        with:
          name: coverage
          path: TestResults/**/coverage.cobertura.xml
